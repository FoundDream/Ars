name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        if: github.event_name == 'pull_request'
        run: make check-commit-msg BASE=origin/${{ github.base_ref }}

      - name: Check SKILL.md frontmatter
        run: make check-skill-frontmatter

      - name: Check README sync
        run: make check-readme-sync
